<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Archery (Three.js r160 module)</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#87ceeb; }
    #hud{
      position:fixed; left:12px; top:12px; z-index:10;
      padding:10px 12px; border-radius:8px;
      background:rgba(0,0,0,.45); color:#fff;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      font-size:13px; line-height:1.5; user-select:none;
    }
    #crosshair{
      position:fixed; left:50%; top:50%; z-index:10;
      width:14px; height:14px; transform:translate(-50%,-50%);
      pointer-events:none; opacity:.95;
    }
    #crosshair::before,#crosshair::after{
      content:""; position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,.95); border-radius:1px;
    }
    #crosshair::before{ width:14px; height:2px; }
    #crosshair::after { width:2px; height:14px; }

    #overlay{
      position:fixed; inset:0; z-index:20;
      display:grid; place-items:center;
      background:rgba(0,0,0,.55); color:#fff;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      text-align:center; padding:20px;
    }
    #overlay.hidden{ display:none; }
    .card{
      max-width:640px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:16px; padding:18px;
      backdrop-filter: blur(6px);
    }
    .card h1{ font-size:18px; margin:0 0 10px; }
    .card p{ margin:6px 0; opacity:.95; }
    .kbd{
      display:inline-block; padding:2px 8px; border-radius:8px;
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.25);
    }
    .err{
      margin-top:10px; text-align:left; white-space:pre-wrap;
      background:rgba(0,0,0,.35); padding:10px; border-radius:10px;
      border:1px solid rgba(255,255,255,.15);
      font-size:12px; opacity:.95;
    }
  </style>

  <!-- ★これが肝： "three" をどこから読むかブラウザに教える -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud"></div>
  <div id="crosshair"></div>

  <div id="overlay">
    <div class="card">
      <h1>3Dアーチェリー</h1>
      <p>クリックで開始（マウス固定 / PointerLock）</p>
      <p><span class="kbd">左クリック</span>：発射　/　<span class="kbd">R</span>：リセット　/　<span class="kbd">ESC</span>：解除</p>
      <p style="opacity:.85">矢は常に画面中央から奥へ。マウスで視点移動して照準を合わせます。</p>
      <div id="err" class="err" style="display:none;"></div>
    </div>
  </div>

  <script type="module">
    // ============================================================
    // ユーザー指定：このimportを使う（OK）
    // ============================================================
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // ★addons経由で読み込む（内部で "three" を参照するが importmap で解決される）
    import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";

    const overlay = document.getElementById("overlay");
    const errBox  = document.getElementById("err");
    const hud     = document.getElementById("hud");

    function showError(msg){
      errBox.style.display = "block";
      errBox.textContent = msg;
    }
    window.addEventListener("error", (e)=>{
      if (errBox.style.display === "block") return;
      showError("エラー:\n" + (e.message || e.error || e));
    });

    try {
      // ----------------------------
      // Scene / Camera / Renderer
      // ----------------------------
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb); // 青空

      const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 500);
      camera.position.set(0, 1.6, 8);

      const renderer = new THREE.WebGLRenderer({ antialias:true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // ----------------------------
      // Controls（マウス視点）
      // ----------------------------
      const controls = new PointerLockControls(camera, document.body);
      overlay.addEventListener("click", ()=> controls.lock());
      controls.addEventListener("lock",   ()=> overlay.classList.add("hidden"));
      controls.addEventListener("unlock", ()=> overlay.classList.remove("hidden"));

      // ----------------------------
      // Light
      // ----------------------------
      scene.add(new THREE.HemisphereLight(0xffffff, 0x335566, 0.95));
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(5,10,3);
      scene.add(dir);

      // ----------------------------
      // Ground
      // ----------------------------
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshStandardMaterial({ color:0x4c9a4c, roughness:1.0 })
      );
      ground.rotation.x = -Math.PI/2;
      scene.add(ground);

      // ----------------------------
      // Target texture (Canvas)
      // ----------------------------
      function createTargetTexture(size=512){
        const c = document.createElement("canvas");
        c.width = c.height = size;
        const ctx = c.getContext("2d");

        ctx.fillStyle = "#fff";
        ctx.fillRect(0,0,size,size);

        const cx=size/2, cy=size/2;
        const rings = [
          { r: 250, color:"#ffffff" },
          { r: 200, color:"#111111" },
          { r: 150, color:"#1e5bd7" },
          { r: 100, color:"#d72626" },
          { r:  55, color:"#f0d000" },
          { r:  25, color:"#f0d000" },
        ];

        for (const ring of rings){
          ctx.beginPath(); ctx.arc(cx,cy,ring.r,0,Math.PI*2);
          ctx.closePath(); ctx.fillStyle = ring.color; ctx.fill();
        }

        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 6;
        for (const ring of rings){
          ctx.beginPath(); ctx.arc(cx,cy,ring.r,0,Math.PI*2); ctx.stroke();
        }

        ctx.fillStyle="rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();

        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return tex;
      }

      // ----------------------------
      // Target (archery)
      // ----------------------------
      const targetGroup = new THREE.Group();
      const targetRadius = 0.7;

      const targetFace = new THREE.Mesh(
        new THREE.CircleGeometry(targetRadius, 64),
        new THREE.MeshStandardMaterial({ map:createTargetTexture(), roughness:0.9 })
      );
      targetFace.position.set(0, 1.6, -25);
      targetFace.rotation.y = Math.PI;
      targetGroup.add(targetFace);

      const back = new THREE.Mesh(
        new THREE.CylinderGeometry(targetRadius, targetRadius, 0.12, 48),
        new THREE.MeshStandardMaterial({ color:0xd2b48c, roughness:1.0 })
      );
      back.position.copy(targetFace.position);
      back.rotation.x = Math.PI/2;
      targetGroup.add(back);

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.06, 2.2, 16),
        new THREE.MeshStandardMaterial({ color:0x6b4f2a, roughness:1.0 })
      );
      pole.position.set(0, 0.9, -25);
      targetGroup.add(pole);

      scene.add(targetGroup);

      // ----------------------------
      // Bow (small, off-center)
      // ----------------------------
      const bowGroup = new THREE.Group();
      const bow = new THREE.Mesh(
        new THREE.TorusGeometry(0.55, 0.03, 10, 64, Math.PI),
        new THREE.MeshStandardMaterial({ color:0x4b2e14, roughness:1.0 })
      );
      bow.position.set(0.55, -0.35, -0.9);
      bow.rotation.z = Math.PI/2;
      bowGroup.add(bow);

      const stringGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0.55, -0.35-0.55, -0.9),
        new THREE.Vector3(0.55, -0.35+0.55, -0.9),
      ]);
      bowGroup.add(new THREE.Line(stringGeo, new THREE.LineBasicMaterial({ color:0xffffff })));

      camera.add(bowGroup);
      scene.add(camera);

      // ----------------------------
      // Physics
      // ----------------------------
      const GRAVITY = new THREE.Vector3(0, -9.8, 0);
      const ARROW_SPEED = 32;
      const MAX_LIFETIME = 8.0;

      function getCameraForward(){
        return new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
      }

      function getMuzzlePosition(){
        const p = new THREE.Vector3();
        camera.getWorldPosition(p);
        p.addScaledVector(getCameraForward(), 0.6);
        p.y -= 0.03;
        return p;
      }

      // ----------------------------
      // Arrow model (thicker)
      // ----------------------------
      function createArrowMesh(){
        const shaft = new THREE.Mesh(
          new THREE.CylinderGeometry(0.02, 0.02, 0.9, 12),
          new THREE.MeshStandardMaterial({ color:0x333333, roughness:0.8 })
        );

        const tip = new THREE.Mesh(
          new THREE.ConeGeometry(0.035, 0.12, 16),
          new THREE.MeshStandardMaterial({ color:0x888888, roughness:0.4 })
        );
        tip.position.y = 0.9/2 + 0.06;

        const fMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.9 });
        const f1 = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.02,0.03), fMat);
        const f2 = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.02,0.03), fMat);
        const f3 = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.02,0.03), fMat);

        const baseY = -0.9/2 + 0.10;
        f1.position.set( 0.04, baseY, 0);
        f2.position.set(-0.04, baseY, 0); f2.rotation.y = Math.PI/2;
        f3.position.set( 0.00, baseY, 0.04); f3.rotation.x = Math.PI/2;

        const g = new THREE.Group();
        g.add(shaft, tip, f1, f2, f3);

        // CylinderがY軸方向なので、矢の前方基準をZに合わせる
        g.rotation.x = Math.PI/2;
        return g;
      }

      // ----------------------------
      // Trajectory preview (thick tube)
      // ----------------------------
      let trajectoryMesh = null;

      function updateTrajectoryPreview(){
        if (trajectoryMesh){
          scene.remove(trajectoryMesh);
          trajectoryMesh.geometry.dispose();
          trajectoryMesh.material.dispose();
          trajectoryMesh = null;
        }

        const start = getMuzzlePosition();
        const v0 = getCameraForward().multiplyScalar(ARROW_SPEED);

        const points = [];
        const step = 0.08;
        const total = 2.2;

        for (let t=0; t<=total; t+=step){
          const p = new THREE.Vector3()
            .copy(start)
            .addScaledVector(v0, t)
            .addScaledVector(GRAVITY, 0.5*t*t);
          points.push(p);
        }

        const curve = new THREE.CatmullRomCurve3(points);
        const tubeGeo = new THREE.TubeGeometry(curve, 80, 0.03, 10, false);
        const tubeMat = new THREE.MeshStandardMaterial({
          color:0xffffff, transparent:true, opacity:0.45, roughness:1.0
        });

        trajectoryMesh = new THREE.Mesh(tubeGeo, tubeMat);
        scene.add(trajectoryMesh);
      }

      // ----------------------------
      // Arrows update
      // ----------------------------
      const arrows = [];

      function shootArrow(){
        const arrow = createArrowMesh();

        const start = getMuzzlePosition();
        arrow.position.copy(start);

        const forward = getCameraForward();
        const velocity = forward.clone().multiplyScalar(ARROW_SPEED);

        arrow.lookAt(start.clone().add(forward));
        scene.add(arrow);

        arrows.push({ mesh:arrow, velocity, age:0, stuck:false });
      }

      // ----------------------------
      // Hit test
      // ----------------------------
      const tmp = new THREE.Vector3();

      function checkHit(prevPos, nextPos){
        const center = targetFace.getWorldPosition(new THREE.Vector3());
        const normal = new THREE.Vector3(0,0,1)
          .applyQuaternion(targetFace.getWorldQuaternion(new THREE.Quaternion()))
          .normalize();

        const d1 = prevPos.clone().sub(center).dot(normal);
        const d2 = nextPos.clone().sub(center).dot(normal);
        if (d1*d2 > 0) return null;

        const t = d1/(d1-d2);
        if (t<0 || t>1) return null;

        const hitPos = prevPos.clone().lerp(nextPos, t);

        tmp.copy(hitPos).sub(center);
        const planar = tmp.clone().sub(normal.clone().multiplyScalar(tmp.dot(normal)));
        const dist = planar.length();

        if (dist <= targetRadius) return { hitPos, dist };
        return null;
      }

      function scoreFromDist(dist){
        const n = 1 - dist/targetRadius;
        return Math.max(1, Math.round(n*10));
      }

      // ----------------------------
      // HUD
      // ----------------------------
      let totalScore=0, hits=0, shots=0;
      function updateHUD(){
        hud.innerHTML = `
          <div>Shots: <b>${shots}</b> / Hits: <b>${hits}</b> / Score: <b>${totalScore}</b></div>
          <div style="opacity:.85">視点: マウス / 左クリック: 発射 / R: リセット</div>
        `;
      }
      updateHUD();

      // ----------------------------
      // Input
      // ----------------------------
      addEventListener("mousedown", (e)=>{
        if (!controls.isLocked) return;
        if (e.button === 0){
          shootArrow();
          shots++;
          updateHUD();
        }
      });

      addEventListener("keydown", (e)=>{
        if (e.key.toLowerCase() === "r"){
          for (const a of arrows) scene.remove(a.mesh);
          arrows.length = 0;
          totalScore=0; hits=0; shots=0;
          updateHUD();
        }
      });

      // ----------------------------
      // Main loop
      // ----------------------------
      let last = performance.now();
      function animate(now){
        requestAnimationFrame(animate);
        const dt = Math.min(0.033, (now-last)/1000);
        last = now;

        updateTrajectoryPreview();

        for (let i=arrows.length-1; i>=0; i--){
          const a = arrows[i];
          if (a.stuck) continue;

          a.age += dt;
          if (a.age > MAX_LIFETIME){
            scene.remove(a.mesh);
            arrows.splice(i, 1);
            continue;
          }

          const prevPos = a.mesh.position.clone();

          a.velocity.addScaledVector(GRAVITY, dt);
          a.mesh.position.addScaledVector(a.velocity, dt);

          const nextPos = a.mesh.position.clone();

          if (a.velocity.lengthSq() > 0.001){
            const d = a.velocity.clone().normalize();
            a.mesh.lookAt(a.mesh.position.clone().add(d));
          }

          const hit = checkHit(prevPos, nextPos);
          if (hit){
            a.mesh.position.copy(hit.hitPos);
            const s = scoreFromDist(hit.dist);
            totalScore += s; hits++;
            updateHUD();

            a.velocity.set(0,0,0);
            a.stuck = true;
          }
        }

        renderer.render(scene, camera);
      }
      requestAnimationFrame(animate);

      // ----------------------------
      // Resize
      // ----------------------------
      addEventListener("resize", ()=>{
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

    } catch (e) {
      showError("初期化エラー:\n" + (e?.stack || e?.message || e));
    }
  </script>
</body>
</html>
