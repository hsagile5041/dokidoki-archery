<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Archery - Sky + Archery Target + Clean Sight</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background:#87ceeb; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #hud {
      position: fixed; left: 12px; top: 12px; color: #0b1020; z-index: 10;
      background: rgba(255,255,255,.70); padding: 10px 12px; border-radius: 10px; backdrop-filter: blur(6px);
      line-height: 1.35;
      border: 1px solid rgba(0,0,0,.10);
    }
    #centerDot {
      position: fixed; left: 50%; top: 50%;
      width: 7px; height: 7px; margin-left: -3.5px; margin-top: -3.5px;
      border-radius: 999px; background: rgba(0,0,0,.78); z-index: 10;
      box-shadow: 0 0 0 2px rgba(255,255,255,.85), 0 0 14px rgba(0,0,0,.18);
    }
    #chargeBarWrap { margin-top: 8px; width: 220px; height: 10px; border-radius: 999px; background: rgba(0,0,0,.10); overflow: hidden; }
    #chargeBar { height: 100%; width: 0%; background: linear-gradient(90deg, #60a5fa, #2563eb, #f59e0b); }
    #overlay {
      position: fixed; inset: 0; display: grid; place-items: center; z-index: 20;
      background: radial-gradient(ellipse at center, rgba(255,255,255,.35), rgba(0,0,0,.15));
      color: #0b1020;
    }
    #overlay .card {
      width: min(650px, 92vw);
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
    }
    .btn {
      display: inline-block; margin-top: 12px;
      background: #2563eb; color: white; border: 0;
      padding: 10px 14px; border-radius: 12px; cursor: pointer;
      font-weight: 800;
    }
    .muted { opacity:.8; font-size: 13px; }
  </style>
</head>
<body>
  <div id="hud">
    <div><b>3D Archery</b> — 青空 / 的 / センターショット</div>
    <div>Score: <span id="score">0</span> / Shots: <span id="shots">0</span></div>
    <div class="muted">Click: lock / Mouse: look / LMB hold: charge → release: shoot / R: reload / Esc: unlock</div>
    <div id="chargeBarWrap"><div id="chargeBar"></div></div>
  </div>
  <div id="centerDot"></div>

  <div id="overlay">
    <div class="card">
      <div style="font-size:18px; font-weight:900;">クリックで開始（ポインタロック）</div>
      <div class="muted" style="margin-top:6px;">
        画面中央が照準。マウスで視点を動かして的を中央に合わせ、左クリック長押しでチャージ→離して発射。
      </div>
      <button class="btn" id="startBtn">Start</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // ============================================================
    // 1) 基本セットアップ
    // ============================================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    // ---- 青空：スカイグラデ（簡易） ----
    // 立方体の内側にグラデっぽい色を付けたマテリアルで“空”を作る
    // （超軽量＆確実に青空っぽく見える）
    const skyGeo = new THREE.BoxGeometry(1000, 1000, 1000);
    const skyMats = [
      new THREE.MeshBasicMaterial({ color: 0x8fd3ff, side: THREE.BackSide }), // +X
      new THREE.MeshBasicMaterial({ color: 0x8fd3ff, side: THREE.BackSide }), // -X
      new THREE.MeshBasicMaterial({ color: 0xcfefff, side: THREE.BackSide }), // +Y (上を少し明るく)
      new THREE.MeshBasicMaterial({ color: 0x7cc7ff, side: THREE.BackSide }), // -Y
      new THREE.MeshBasicMaterial({ color: 0x8fd3ff, side: THREE.BackSide }), // +Z
      new THREE.MeshBasicMaterial({ color: 0x8fd3ff, side: THREE.BackSide })  // -Z
    ];
    const sky = new THREE.Mesh(skyGeo, skyMats);
    scene.add(sky);

    // フォグは薄め（遠景をやわらかく）
    scene.fog = new THREE.Fog(0x9ad9ff, 40, 220);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 800);
    camera.position.set(0, 1.6, 6);

    const clock = new THREE.Clock();

    // ---- ライト ----
    scene.add(new THREE.HemisphereLight(0xffffff, 0x4b5563, 1.1));
    const dir = new THREE.DirectionalLight(0xffffff, 0.95);
    dir.position.set(10, 14, 8);
    scene.add(dir);

    // ============================================================
    // 2) 地面（芝っぽい色）
    // ============================================================
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(600, 600),
      new THREE.MeshStandardMaterial({ color: 0x2f8f3a, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // ============================================================
    // 3) アーチェリーの的（配色を“それっぽく”）
    //    白→黒→青→赤→黄（中心ほど高得点）
    // ============================================================
    const targetGroup = new THREE.Group();
    scene.add(targetGroup);

    // 的の板（厚みある円盤）
    const targetDisk = new THREE.Mesh(
      new THREE.CylinderGeometry(1.7, 1.7, 0.22, 80),
      new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.85 })
    );
    targetDisk.rotation.x = Math.PI / 2;
    targetGroup.add(targetDisk);

    // リング（半径と色）
    // ※ 実物の配色感を優先して「白/黒/青/赤/黄」系の段を作る
    function ring(rOuter, rInner, color) {
      const geo = new THREE.RingGeometry(rInner, rOuter, 96);
      const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI / 2;
      mesh.position.z = 0.12; // Zファイティング避け
      return mesh;
    }

    // 外側から内側へ（幅はお好みで調整可）
    targetGroup.add(ring(1.70, 1.36, 0xffffff)); // white
    targetGroup.add(ring(1.36, 1.02, 0x111827)); // black
    targetGroup.add(ring(1.02, 0.72, 0x2563eb)); // blue
    targetGroup.add(ring(0.72, 0.44, 0xef4444)); // red
    targetGroup.add(ring(0.44, 0.20, 0xf59e0b)); // yellow

    // ブルズアイ（中心）
    const bull = new THREE.Mesh(
      new THREE.CircleGeometry(0.12, 64),
      new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
    );
    bull.rotation.x = Math.PI / 2;
    bull.position.z = 0.13;
    targetGroup.add(bull);

    // 枠線（輪郭）
    const outline = new THREE.Mesh(
      new THREE.RingGeometry(1.70, 1.75, 96),
      new THREE.MeshBasicMaterial({ color: 0x0b1020, side: THREE.DoubleSide })
    );
    outline.rotation.x = Math.PI / 2;
    outline.position.z = 0.121;
    targetGroup.add(outline);

    // 支柱＆簡易スタンド
    const stand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 3.4, 16),
      new THREE.MeshStandardMaterial({ color: 0x6b4f2a, roughness: 1 })
    );
    stand.position.set(0, 1.7, 0);
    targetGroup.add(stand);

    const base = new THREE.Mesh(
      new THREE.BoxGeometry(2.4, 0.18, 0.9),
      new THREE.MeshStandardMaterial({ color: 0x6b4f2a, roughness: 1 })
    );
    base.position.set(0, 0.22, 0.15);
    targetGroup.add(base);

    // 配置
    targetGroup.position.set(0, 2.4, -32);

    // ============================================================
    // 4) ポインタロック（視点移動）
    // ============================================================
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    let isLocked = false;

    let yaw = 0, pitch = 0;
    const pitchLimit = Math.PI / 2 - 0.05;

    function requestLock() { renderer.domElement.requestPointerLock(); }

    document.addEventListener("pointerlockchange", () => {
      isLocked = (document.pointerLockElement === renderer.domElement);
      overlay.style.display = isLocked ? "none" : "grid";
    });

    document.addEventListener("mousemove", (e) => {
      if (!isLocked) return;
      const sens = 0.0022;
      yaw   -= e.movementX * sens;
      pitch -= e.movementY * sens;
      pitch = Math.max(-pitchLimit, Math.min(pitchLimit, pitch));
      camera.rotation.set(pitch, yaw, 0, "YXZ");
    });

    startBtn.addEventListener("click", requestLock);
    overlay.addEventListener("click", requestLock);

    // ============================================================
    // 5) 弓（サイトに被らないよう右下へ。細め。弧だけ太め）
    // ============================================================
    const bowRig = new THREE.Group();
    camera.add(bowRig);
    scene.add(camera);

    // ★サイト（画面中央）に被らないよう、右下へ強めにオフセット
    // Z は near(0.1)より十分前へ
    bowRig.position.set(0.78, -0.48, -1.35);
    bowRig.rotation.set(0, 0, 0);

    const bowMesh = new THREE.Group();
    bowRig.add(bowMesh);

    // ---- “弓の軌道（弧）”は見やすく太めに（= torus の太さをUP） ----
    // 0.05 → 0.075 にして見やすく
    const bowArc = new THREE.Mesh(
      new THREE.TorusGeometry(0.62, 0.075, 14, 72, Math.PI),
      new THREE.MeshStandardMaterial({ color: 0x1f7ae0, roughness: 0.35, metalness: 0.2 })
    );
    bowArc.rotation.set(0, 0, Math.PI / 2);
    bowMesh.add(bowArc);

    // ---- グリップや装飾は“細め”に（サイト邪魔しにくく） ----
    const grip = new THREE.Mesh(
      new THREE.CylinderGeometry(0.045, 0.060, 0.30, 18),
      new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 1 })
    );
    grip.rotation.z = Math.PI / 2;
    grip.position.set(0.0, -0.05, 0);
    bowMesh.add(grip);

    // ほんの少しだけ“構え感”を bowMesh 側に（照準軸は壊さない）
    bowMesh.rotation.set(0.08, 0.10, 0);

    // ============================================================
    // 6) 矢（-Z を前方向に統一）
    // ============================================================
    const arrows = [];
    const gravity = new THREE.Vector3(0, -9.8, 0);
    const ARROW_FORWARD_LOCAL = new THREE.Vector3(0, 0, -1);

    function makeArrowMesh() {
      const g = new THREE.Group();

      // shaft（細め）
      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.010, 0.010, 1.05, 12),
        new THREE.MeshStandardMaterial({ color: 0xf3f4f6, roughness: 0.45 })
      );
      shaft.rotation.x = Math.PI / 2;
      g.add(shaft);

      // tip
      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.030, 0.11, 16),
        new THREE.MeshStandardMaterial({ color: 0x6b7280, roughness: 0.35, metalness: 0.25 })
      );
      tip.rotation.x = -Math.PI / 2;
      tip.position.set(0, 0, -0.58);
      g.add(tip);

      // fletch（少し目立たせる）
      const fletchMat = new THREE.MeshStandardMaterial({ color: 0x7c3aed, roughness: 0.6 });
      for (let i = 0; i < 3; i++) {
        const fin = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.02, 0.10), fletchMat);
        fin.position.set(0, 0, 0.48);
        fin.rotation.z = i * (Math.PI * 2 / 3);
        g.add(fin);
      }

      return g;
    }

    // つがえ矢：弓の近く、でもサイトに被らない位置
    const nockedArrow = makeArrowMesh();
    bowRig.add(nockedArrow);
    nockedArrow.position.set(-0.06, 0.03, -0.40);
    nockedArrow.rotation.set(0, 0, 0);

    // ============================================================
    // 7) HUD & 状態
    // ============================================================
    const chargeBar = document.getElementById("chargeBar");
    const scoreEl = document.getElementById("score");
    const shotsEl = document.getElementById("shots");

    let score = 0, shots = 0;
    let holding = false;
    let charge = 0;
    let hasNockedArrow = true;

    function setNockedVisible(v) {
      nockedArrow.visible = v;
      hasNockedArrow = v;
    }
    function updateHUD() {
      scoreEl.textContent = String(score);
      shotsEl.textContent = String(shots);
      chargeBar.style.width = `${Math.round(charge * 100)}%`;
    }
    updateHUD();

    // ============================================================
    // 8) 入力（チャージ/発射/リロード）
    // ============================================================
    document.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      if (!isLocked) return;
      if (!hasNockedArrow) return;
      holding = true;
    });

    document.addEventListener("mouseup", (e) => {
      if (e.button !== 0) return;
      if (!isLocked) return;
      if (!holding) return;
      holding = false;
      shootCenter();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "r") {
        if (!hasNockedArrow) {
          charge = 0;
          setNockedVisible(true);
          updateHUD();
        }
      }
    });

    // ============================================================
    // 9) 発射：カメラ正面（画面中央）へ
    // ============================================================
    function shootCenter() {
      if (!hasNockedArrow) return;

      const minPower = 18;
      const maxPower = 62;
      const power = minPower + (maxPower - minPower) * charge;

      const forward = ARROW_FORWARD_LOCAL.clone()
        .applyQuaternion(camera.quaternion)
        .normalize();

      const spawnPos = camera.position.clone().add(forward.clone().multiplyScalar(1.35));

      const arrow = makeArrowMesh();
      arrow.position.copy(spawnPos);

      const vel = forward.clone().multiplyScalar(power);
      arrow.quaternion.setFromUnitVectors(ARROW_FORWARD_LOCAL, vel.clone().normalize());

      scene.add(arrow);
      arrows.push({ mesh: arrow, vel, stuck: false, life: 0 });

      setNockedVisible(false);
      shots += 1;
      charge = 0;
      updateHUD();
    }

    // ============================================================
    // 10) 当たり判定 & スコア
    // ============================================================
    const targetNormalLocal = new THREE.Vector3(0, 0, 1);
    const targetWorldPos = new THREE.Vector3();
    const targetWorldQuat = new THREE.Quaternion();

    // 的のリングに合わせたスコア（中心ほど高得点）
    // 黄(10) / 赤(7) / 青(5) / 黒(3) / 白(1)
    function scoreFromRadius(r) {
      if (r <= 0.20) return 10; // yellow
      if (r <= 0.44) return 7;  // red
      if (r <= 0.72) return 5;  // blue
      if (r <= 1.02) return 3;  // black
      if (r <= 1.36) return 1;  // white inner
      if (r <= 1.70) return 1;  // white outer
      return 0;
    }

    function tryHitTarget(a, prevPos, nextPos) {
      targetGroup.getWorldPosition(targetWorldPos);
      targetGroup.getWorldQuaternion(targetWorldQuat);

      const n = targetNormalLocal.clone().applyQuaternion(targetWorldQuat).normalize();
      const planePoint = targetWorldPos.clone();

      const segDir = nextPos.clone().sub(prevPos);
      const denom = n.dot(segDir);
      if (Math.abs(denom) < 1e-6) return false;

      const t = n.dot(planePoint.clone().sub(prevPos)) / denom;
      if (t < 0 || t > 1) return false;

      const hitPoint = prevPos.clone().add(segDir.multiplyScalar(t));

      const invQ = targetWorldQuat.clone().invert();
      const local = hitPoint.clone().sub(targetWorldPos).applyQuaternion(invQ);
      const r = Math.hypot(local.x, local.y);

      const pts = scoreFromRadius(r);
      if (pts <= 0) return false;

      a.mesh.position.copy(hitPoint);
      a.mesh.quaternion.setFromUnitVectors(ARROW_FORWARD_LOCAL, a.vel.clone().normalize());
      a.stuck = true;

      score += pts;
      updateHUD();
      return true;
    }

    // ============================================================
    // 11) ループ
    // ============================================================
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      // チャージ中の見た目（弓を少し前へ、矢を引く）
      if (holding && hasNockedArrow) {
        charge = Math.min(1, charge + dt * 0.60);

        bowRig.position.z = -1.35 + charge * 0.07;
        nockedArrow.position.z = -0.40 + charge * 0.10;
      } else {
        bowRig.position.z = -1.35;
        nockedArrow.position.z = -0.40;
      }
      updateHUD();

      // 飛翔中の矢
      for (let i = arrows.length - 1; i >= 0; i--) {
        const a = arrows[i];
        a.life += dt;

        if (a.life > 14) {
          scene.remove(a.mesh);
          arrows.splice(i, 1);
          continue;
        }
        if (a.stuck) continue;

        const prev = a.mesh.position.clone();

        a.vel.addScaledVector(gravity, dt);
        a.mesh.position.addScaledVector(a.vel, dt);

        if (a.vel.length() > 0.001) {
          a.mesh.quaternion.setFromUnitVectors(ARROW_FORWARD_LOCAL, a.vel.clone().normalize());
        }

        // 地面で減衰
        if (a.mesh.position.y < 0.05) {
          a.mesh.position.y = 0.05;
          a.vel.y *= -0.25;
          a.vel.multiplyScalar(0.6);
          if (a.vel.length() < 1.2) a.stuck = true;
          continue;
        }

        const next = a.mesh.position.clone();
        tryHitTarget(a, prev, next);
      }

      renderer.render(scene, camera);
    }
    animate();

    // リサイズ
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
